<!DOCTYPE html>
<html>
<head>
    <title>Student Table Example</title>
</head>
<body>

<h2>Student Data Table Example</h2>

<table border="1">

    <!-- Header Row -->
    <tr>
        <th rowspan="2">Student ID</th>
        <th rowspan="2">Name</th>
        <th colspan="2">Marks</th>
    </tr>

    <tr>
        <th>Maths</th>
        <th>Science</th>
    </tr>

    <!-- Row 1 -->
    <tr>
        <td>101</td>
        <td>Ravi</td>
        <td>85</td>
        <td>90</td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td>102</td>
        <td>Priya</td>
        <td>92</td>
        <td>88</td>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td>103</td>
        <td>Karthik</td>
        <td>76</td>
        <td>80</td>
    </tr>

</table>

</body>
</html>
